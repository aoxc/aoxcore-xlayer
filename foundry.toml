[profile.default]
# ==============================================================================
# --- 🏗️ PROJECT STRUCTURE ---
# ==============================================================================
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"

# ==============================================================================
# --- 🔗 MODULE REMAPPINGS (v2 Architecture) ---
# Enables clean imports: import "aoxc-core/AoxcCore.sol";
# ==============================================================================
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "forge-std/=lib/forge-std/src/",
    
    # Core v2 Module Mapping
    "aoxc-interfaces/=src/aoxcore-v2/interfaces/",
    "aoxc-libraries/=src/aoxcore-v2/libraries/",
    "aoxc-core/=src/aoxcore-v2/core/",
    "aoxc-access/=src/aoxcore-v2/access/",
    "aoxc-abstract/=src/aoxcore-v2/abstract/",
    "aoxc-finance/=src/aoxcore-v2/finance/",
    "aoxc-gov/=src/aoxcore-v2/gov/",
    "aoxc-infra/=src/aoxcore-v2/infra/",
    
    # Version Aliases
    "aoxc-v2/=src/aoxcore-v2/",
    "aoxc-v1/=src/aoxcore-v1/",

    # AOXC Library aliases (module-first consumption)
    "aoxc-lib/=src/aoxc-library/",
    "aoxc-lib-core/=src/aoxc-library/core/",
    "aoxc-lib-treasury/=src/aoxc-library/treasury/",
    "aoxc-lib-ai/=src/aoxc-library/ai/",
    "aoxc-lib-stake/=src/aoxc-library/stake/",
    "aoxc-lib-bridge/=src/aoxc-library/bridge/",
    "aoxc-lib-access/=src/aoxc-library/access/",
    "aoxc-lib-gov/=src/aoxc-library/governance/",
    "aoxc-lib-infra/=src/aoxc-library/infra/"

]

# ==============================================================================
# --- 🧠 COMPILER & OPTIMIZATION ---
# Using 0.8.24 for broad EVM compatibility (X-Layer/Polygon CDK)
# ==============================================================================
solc_version = "0.8.33" 
optimizer = true
optimizer_runs = 500
via_ir = true 

# ==============================================================================
# --- 🛡️ SECURITY & VERIFICATION ---
# ==============================================================================
bytecode_hash = "none"
extra_output = ["abi", "storageLayout", "metadata"]

[fuzz]
runs = 1000 

# ==============================================================================
# --- 🌐 INFRASTRUCTURE ---
# ==============================================================================
[rpc_endpoints]
xlayer_testnet = "https://testrpc.xlayer.tech"

[etherscan]
xlayer = { key = "${OKLINK_API_KEY}", url = "https://www.oklink.com/api/v5/explorer/contract/verify-source-code-plugin/xlayer" }
