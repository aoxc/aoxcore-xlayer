[profile.default]
# ==============================================================================
# --- 🏗️ PROJECT STRUCTURE ---
# ==============================================================================
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"

# ==============================================================================
# --- 🔗 REMAPPINGS (Kısaltılmış & Modüler) ---
# Artık importlar: "aoxc/core/AoxcCore.sol" şeklinde olacak.
# ==============================================================================
remappings = [
    "@openzeppelin/contracts=lib/openzeppelin-contracts/contracts",
    "@openzeppelin/contracts-upgradeable=lib/openzeppelin-contracts-upgradeable/contracts",
    "forge-std=lib/forge-std/src",
    "aoxc=src",
    "aoxc-core=src/core",
    "aoxc-finance=src/finance",
    "aoxc-infra=src/infra",
    "aoxc-gov=src/gov",
    "aoxc-test=test",
    "aoxc-interfaces=src/interfaces",
    "aoxc-libraries=src/libraries",
    "aoxc-abstract=src/abstract"
]

# ==============================================================================
# --- 🧠 COMPILER STRATEGY ---
# ==============================================================================
solc_version = "0.8.33"
optimizer = true
optimizer_runs = 200
via_ir = true

# ==============================================================================
# --- 🛡️ SECURITY & OUTPUT ---
# ==============================================================================
bytecode_hash = "none"
extra_output = ["abi", "storageLayout"]

[fuzz]
runs = 256

[rpc_endpoints]
xlayer_testnet = "https://testrpc.xlayer.tech/terigon"

[etherscan]
xlayer = { key = "${OKLINK_API_KEY}", url = "https://www.oklink.com/api/v5/explorer/contract/verify-source-code-plugin/xlayer" }
