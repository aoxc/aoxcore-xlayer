<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    
    <link rel="icon" type="image/svg+xml" href="/aoxc-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <title>AOXCORE | Neural Architecture & Sentinel OS</title>
    <meta name="description" content="Professional-grade neural operating interface for AOXCORE Protocol. Integrated with Gemini Sentinel for advanced on-chain security audit." />
    <meta name="theme-color" content="#0a0a0a" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet" />

    <style>
      /* AOXC Global Resets */
      :root { --aoxc-bg: #030303; --aoxc-primary: #00f2ff; }
      body, html { 
        background-color: var(--aoxc-bg); 
        margin: 0; padding: 0; 
        width: 100%; height: 100%;
        overflow: hidden; /* Build sırasında kaymaları önlemek için kritik */
        font-family: 'JetBrains Mono', monospace;
      }

      /* Initial Loader (Splash Screen) - Yerleşimi bozmaması için Fixed yapıldı */
      #initial-loader {
        position: fixed; top: 0; left: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100vh; width: 100vw; 
        background-color: var(--aoxc-bg);
        color: var(--aoxc-primary);
        z-index: 9999; /* Her şeyin üstünde olması şart */
        transition: opacity 0.5s ease-out; /* Yumuşak kapanış */
      }

      .pulse-logo {
        width: 64px; height: 64px; 
        border: 2px solid var(--aoxc-primary);
        border-radius: 50%; 
        animation: pulse 2s infinite;
        position: relative;
      }

      /* Logo içine küçük bir nokta (Merkezleme) */
      .pulse-logo::after {
        content: ''; position: absolute; top: 50%; left: 50%;
        width: 4px; height: 4px; background: var(--aoxc-primary);
        border-radius: 50%; transform: translate(-50%, -50%);
      }

      @keyframes pulse {
        0% { transform: scale(0.95); opacity: 0.5; box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.4); }
        70% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 15px rgba(0, 242, 255, 0); }
        100% { transform: scale(0.95); opacity: 0.5; box-shadow: 0 0 0 0 rgba(0, 242, 255, 0); }
      }

      .loading-text { 
        margin-top: 24px; font-size: 10px; font-weight: 700;
        letter-spacing: 4px; text-transform: uppercase; 
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <div class="pulse-logo"></div>
      <div class="loading-text">Synchronizing AOXC Neural Link...</div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      // AOXC_SENTINEL_PROTOCOL: React yüklendiğinde loader'ı temizle
      window.addEventListener('load', () => {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          setTimeout(() => {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 500); // DOM'dan tamamen at
          }, 1000);
        }
      });
    </script>

    <noscript>
      <div style="background: #000; color: #ff0055; text-align: center; padding: 100px; height: 100vh;">
        <h1 style="font-family: monospace;">KERNEL_PANIC: JAVASCRIPT_DISABLED</h1>
        <p>AOXCORE Neural OS requires JavaScript to function.</p>
      </div>
    </noscript>
  </body>
</html>
