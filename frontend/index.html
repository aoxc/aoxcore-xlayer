<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    
    <link rel="icon" type="image/svg+xml" href="/aoxc-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <title>AOXCORE | Neural Architecture & Sentinel OS</title>
    <meta name="description" content="Professional-grade neural operating interface for AOXCORE Protocol. Integrated with Gemini Sentinel for advanced on-chain security audit." />
    <meta name="theme-color" content="#0a0a0a" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet" />

    <style>
      /* Kritik Yükleme Ekranı (Splash Screen) Stilleri */
      :root { --aoxc-bg: #050505; --aoxc-primary: #00f2ff; }
      body { background-color: var(--aoxc-bg); margin: 0; overflow: hidden; font-family: 'JetBrains Mono', monospace; }
      #initial-loader {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100vh; width: 100vw; color: var(--aoxc-primary);
      }
      .pulse-logo {
        width: 64px; height: 64px; border: 2px solid var(--aoxc-primary);
        border-radius: 50%; animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% { transform: scale(0.95); opacity: 0.5; box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.7); }
        70% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 10px rgba(0, 242, 255, 0); }
        100% { transform: scale(0.95); opacity: 0.5; box-shadow: 0 0 0 0 rgba(0, 242, 255, 0); }
      }
      .loading-text { margin-top: 20px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="pulse-logo"></div>
        <div class="loading-text">Initializing AOXCORE Neural Engine...</div>
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
    
    <noscript>
      <div style="color: white; text-align: center; padding: 50px;">
        AOXCORE Neural OS requires JavaScript to function. Please enable it in your browser settings.
      </div>
    </noscript>
  </body>
</html>
